
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - Health Hub</title>

<style>

body{
    font-family:Arial,sans-serif;
    margin:0;
    background:#E6F7FF;
}

/* Header */

.header{
    background:#0077b6;
    color:white;
    text-align:center;
    padding:20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* Welcome */

.welcome{
    text-align:center;
    color:#023e8a;
    margin:20px;
}

/* Dashboard */

.dashboard{
    width:90%;
    max-width:700px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

/* Cards */

.card{
    background:#0077b6;
    color:white;
    padding:20px;
    border-radius:12px;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
    font-size:18px;
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

.card:hover{
    background:#023e8a;
    transform:translateY(-3px);
}

/* Logout */

.logout{
    text-align:center;
    margin:20px;
}

.logout button{
    background:red;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.logout button:hover{
    background:darkred;
}

</style>
</head>

<body>

<div class="header">
    <h2>Admin Dashboard</h2>
</div>

<div class="welcome">
    <h3>Welcome Administrator 👨‍💼</h3>
    <p>Manage the complete HealthHub system.</p>
</div>

<div class="dashboard">

    <!-- UPDATE -->
    <div class="card">
        <a href="ManageDoctors.html">👨‍⚕️ Manage Doctors</a>
    </div>

    <!-- UPDATE -->
    <div class="card">
       👥 Manage Patients
    </div>

    <!-- UPDATE -->
    <div class="card">
        📅 View Appointments
    </div>

    <!-- UPDATE -->
    <div class="card">
        🏥 Hospital Management
    </div>

    <!-- NEW -->
    <div class="card">
        📊 Reports & Statistics
    </div>

    <!-- NEW -->
    <div class="card">
        🚨 Emergency Requests
    </div>

</div>

<div class="logout">
    <button onclick="logout()">Logout</button>
</div>

<script>

function logout(){

    localStorage.clear();

    alert("Logged Out Successfully");

    window.location.href="login.html";
}

</script>

</body>
</html>
