<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Manage Doctors - Health Hub</title>
<style>
body{margin:0;font-family:Arial;background:#E6F7FF}
nav{background:#0077b6;color:#fff;padding:16px;text-align:center}
.container{width:95%;max-width:1100px;margin:25px auto}
.card{background:#fff;padding:20px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.15);margin-bottom:20px}
.stats{display:flex;gap:15px;flex-wrap:wrap}
.stat{flex:1;min-width:180px;background:#023e8a;color:#fff;padding:15px;border-radius:10px;text-align:center}
input,select{padding:10px;margin:8px;width:calc(33% - 20px)}
button{background:#023e8a;color:#fff;border:none;padding:10px 16px;border-radius:6px;cursor:pointer}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ddd;padding:10px;text-align:center}
th{background:#0077b6;color:#fff}
.action button{margin:2px}
</style>
</head>
<body>
<nav><h2>Health Hub - Manage Doctors</h2></nav>
<div class="container">
<div class="stats">
<div class="stat"><h2>25</h2><p>Total Doctors</p></div>
<div class="stat"><h2>20</h2><p>Available</p></div>
<div class="stat"><h2>5</h2><p>On Leave</p></div>
</div>

<div class="card">
<h3>Add Doctor</h3>
<!-- UPDATE: Connect form with Java Servlet -->
<input placeholder="Doctor Name">
<input placeholder="Specialization">
<input placeholder="Mobile">
<input placeholder="Email">
<input placeholder="Experience">
<select><option>Available</option><option>On Leave</option></select>
<br><button onclick="alert('Java Servlet Integration Pending')">Add Doctor</button>
</div>

<div class="card">
<input id="search" placeholder="Search Doctor..." onkeyup="searchDoctor()" style="width:98%">
<table id="doctorTable">
<tr><th>ID</th><th>Name</th><th>Department</th><th>Experience</th><th>Phone</th><th>Status</th><th>Action</th></tr>
<tr><td>101</td><td>Dr. Sharma</td><td>Cardiology</td><td>10 Years</td><td>9876543210</td><td>Available</td><td class="action">
<button onclick="viewDoc('Dr. Sharma')">View</button>
<button onclick="editDoc('Dr. Sharma')">Edit</button>
<button onclick="delDoc()">Delete</button></td></tr>
<tr><td>102</td><td>Dr. Patil</td><td>Orthopedic</td><td>8 Years</td><td>9876500001</td><td>Available</td><td class="action">
<button onclick="viewDoc('Dr. Patil')">View</button>
<button onclick="editDoc('Dr. Patil')">Edit</button>
<button onclick="delDoc()">Delete</button></td></tr>
</table>
</div>
<button onclick="location.href='AdminDashboard.html'">⬅ Back</button>
</div>
<script>
function viewDoc(n){alert("Doctor: "+n);}
function editDoc(n){alert("Edit "+n);}
function delDoc(){if(confirm("Delete doctor?")) alert("Deleted");}
function searchDoctor(){
let f=document.getElementById('search').value.toUpperCase();
let tr=document.querySelectorAll('#doctorTable tr');
for(let i=1;i<tr.length;i++){
let t=tr[i].cells[1].innerText.toUpperCase();
tr[i].style.display=t.indexOf(f)>-1?'':'none';
}}
</script>
</body></html>
